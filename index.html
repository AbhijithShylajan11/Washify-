<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Washify | Smart Laundry Systems</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050a18;
            --card-bg: rgba(255, 255, 255, 0.05);
            --neon-blue: #00f2ff;
            --neon-purple: #7000ff;
            --text: #ffffff;
            --text-dim: #b0b0b0;
            --error: #ff4d4d;
            --success: #00ff88;
        }

        * { margin: 0; padding: 0; box-執ing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; line-height: 1.6; }
        
        /* Navigation */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: rgba(5, 10, 24, 0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-size: 20px; font-weight: 800; letter-spacing: 1px; }
        .logo span { color: var(--neon-blue); }

        /* Mobile Responsive Utilities */
        .page { display: none; padding: 40px 5%; min-height: 90vh; }
        .page.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Glassmorphism Cards */
        .glass-card { background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        
        /* Buttons */
        .btn-neon { background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; }
        .btn-primary { background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple)); border: none; color: white; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; }

        /* Dashboard & Form Elements */
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 8px; }
        .water-container { width: 100%; height: 12px; background: #111; border-radius: 6px; margin: 15px 0; overflow: hidden; }
        .water-level { height: 100%; width: 0%; transition: 1s ease; }
        .big-code { font-size: 36px; font-weight: 800; color: var(--neon-blue); text-align: center; letter-spacing: 5px; margin: 10px 0; }
        
        .hero { text-align: center; padding-top: 20px; }
        .hero h1 { font-size: 32px; margin-bottom: 15px; }
        .text-gradient { background: linear-gradient(to right, var(--neon-blue), #7000ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .history-item { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 10px 0; font-size: 14px; }
        .hidden { display: none; }
        .error-msg { color: var(--error); font-size: 13px; text-align: center; }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="showPage('home')">WASH<span>IFY</span></div>
        <button id="auth-btn" onclick="showPage('login')" class="btn-neon" style="width: auto; padding: 5px 15px;">Login</button>
    </nav>

    <main id="main-content">
        <section id="home" class="page active">
            <div class="hero">
                <h1>Smart Laundry <br><span class="text-gradient">System</span></h1>
                <p style="color: var(--text-dim); margin-bottom: 25px;">IoT Booking & Real-time Monitoring for Hostels.</p>
                <button onclick="showPage('login')" class="btn-primary">Get Started</button>
            </div>
            <div style="margin-top: 40px;">
                <div class="glass-card">
                    <i class="fas fa-microchip" style="color: var(--neon-blue);"></i>
                    <h3>ESP32 Powered</h3>
                    <p style="font-size: 14px; color: var(--text-dim);">Secure hardware-level access control.</p>
                </div>
            </div>
        </section>

        <section id="login" class="page">
            <div class="glass-card">
                <h2 style="text-align: center;">User Login</h2>
                <p style="text-align: center; font-size: 14px; color: var(--text-dim);">Enter your hostel credentials</p>
                <form id="login-form">
                    <input type="text" id="login-user" placeholder="Username (e.g. abhinav)" required>
                    <input type="text" id="login-hostel" placeholder="Hostel Name" required>
                    <input type="text" id="login-room" placeholder="Room Number" required>
                    <button type="submit" class="btn-primary">Sign In</button>
                </form>
                <p id="login-error" class="error-msg"></p>
            </div>
        </section>

        <section id="dashboard" class="page">
            <div style="margin-bottom: 20px;">
                <h2 id="dash-welcome">Hi, User</h2>
                <small id="dash-details" style="color: var(--text-dim);"></small>
            </div>

            <div class="glass-card">
                <h4><i class="fas fa-tint"></i> Tank Water Level</h4>
                <div class="water-container">
                    <div id="water-bar" class="water-level"></div>
                </div>
                <small id="water-text">Checking system...</small>
            </div>

            <div class="glass-card">
                <h4><i class="fas fa-plus-circle"></i> Book a Machine</h4>
                <select id="machine-select">
                    <option>Machine 1 - Front Load</option>
                    <option>Machine 2 - Top Load</option>
                </select>
                <input type="time" id="slot-time">
                <button id="book-btn" class="btn-primary">Get Access Code</button>
            </div>

            <div id="receipt-area" class="glass-card hidden" style="border: 2px solid var(--neon-blue);">
                <h4 style="text-align: center;">YOUR CODE</h4>
                <div class="big-code" id="access-code-display">0000</div>
                <p id="receipt-time" style="text-align: center; font-size: 12px;"></p>
            </div>

            <div class="glass-card">
                <h4>History</h4>
                <div id="booking-history"></div>
            </div>

            <button onclick="logout()" class="btn-neon" style="color: var(--error); border-color: var(--error);">Logout</button>
        </section>
    </main>

    <script>
        const demoUsers = [
            { user: "abhinav", hostel: "kattakada hostel", room: "105" },
            { user: "arjun", hostel: "city hostel", room: "212" },
            { user: "nikhil", hostel: "green pg", room: "309" },
            { user: "rahul", hostel: "sunrise hostel", room: "118" }
        ];

        let currentUser = JSON.parse(localStorage.getItem('washify_user')) || null;
        let bookings = JSON.parse(localStorage.getItem('washify_bookings')) || [];

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(pageId === 'dashboard') loadDashboard();
        }

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const u = document.getElementById('login-user').value.toLowerCase();
            const h = document.getElementById('login-hostel').value.toLowerCase();
            const r = document.getElementById('login-room').value;

            const found = demoUsers.find(user => user.user === u && user.hostel === h && user.room === r);

            if(found) {
                currentUser = found;
                localStorage.setItem('washify_user', JSON.stringify(found));
                showPage('dashboard');
            } else {
                document.getElementById('login-error').innerText = "Invalid credentials. Try 'abhinav'.";
            }
        });

        function loadDashboard() {
            if(!currentUser) return showPage('login');
            document.getElementById('dash-welcome').innerText = "Hi, " + currentUser.user;
            document.getElementById('dash-details').innerText = `${currentUser.hostel} | Room ${currentUser.room}`;
            
            // Water Level Simulation
            const bar = document.getElementById('water-bar');
            bar.style.width = "75%";
            bar.style.backgroundColor = "var(--success)";
            document.getElementById('water-text').innerText = "Status: Healthy (75%)";
            
            renderHistory();
        }

        document.getElementById('book-btn').addEventListener('click', () => {
            const time = document.getElementById('slot-time').value;
            if(!time) return alert("Select a time");

            const code = Math.floor(1000 + Math.random() * 9000);
            const newB = { user: currentUser.user, machine: document.getElementById('machine-select').value, time, code };
            
            bookings.unshift(newB);
            localStorage.setItem('washify_bookings', JSON.stringify(bookings));
            
            document.getElementById('receipt-area').classList.remove('hidden');
            document.getElementById('access-code-display').innerText = code;
            document.getElementById('receipt-time').innerText = `Slot: ${time}`;
            renderHistory();
        });

        function renderHistory() {
            const h = document.getElementById('booking-history');
            h.innerHTML = bookings.slice(0,3).map(b => `
                <div class="history-item">
                    <span>${b.time} - ${b.machine}</span>
                    <span style="color:var(--neon-blue)">#${b.code}</span>
                </div>
            `).join('');
        }

        function logout() {
            localStorage.removeItem('washify_user');
            location.reload();
        }

        window.onload = () => { if(currentUser) showPage('dashboard'); };
    </script>
</body>
</html>
